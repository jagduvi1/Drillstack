services:
  mongo:
    image: mongo:7
    container_name: drillstack-mongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: drillstack-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: drillstack-meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterkey-dev-change-in-prod}
      - MEILI_ENV=production
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: drillstack-backend
    environment:
      - MONGO_URI=mongodb://mongo:27017/training_bank
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - PORT=4000
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterkey-dev-change-in-prod}
      - QDRANT_URL=http://qdrant:6333
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-6}
      - AI_API_KEY=${AI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-voyage}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-voyage-3-lite}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-}
      - SUPER_ADMIN_IPS=${SUPER_ADMIN_IPS:-}
    volumes:
      - upload-data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: drillstack-frontend
    expose:
      - "80"
    networks:
      - web
      - default
    labels:
      traefik.enable: "true"
      traefik.docker.network: "web"
      traefik.http.routers.drillstack.rule: "Host(`drillstack.app`)"
      traefik.http.routers.drillstack.entrypoints: "web"
      traefik.http.services.drillstack.loadbalancer.server.port: "80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
  qdrant-data:
  meili-data:
  upload-data:

networks:
  web:
    external: true
